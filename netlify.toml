[build]
  command = "apt-get update && apt-get install -y gdal-bin libgdal-dev && pip install -r requirements.txt && python backend/manage.py collectstatic --noinput"
  publish = "staticfiles"

[[plugins]]
  package = "netlify-plugin-debian-packages"

  [plugins.inputs]
    packages = ["gdal-bin", "libgdal-dev"]
