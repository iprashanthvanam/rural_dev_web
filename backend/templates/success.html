<!-- backend\templates\success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    {% load static %}
    <!-- <link rel="stylesheet" href="{% static 'css/styles.css' %}"> -->
     <style>
        /* ==========================================================================
   Success Page Styles
   ========================================================================== */

/* Center align the content specifically for the success page */
.container:has(h1) {
    text-align: center;
}

/* Success Heading - overriding the base gradient for a "Success" feel */
.container h1 {
    background: linear-gradient(to right, #10b981, #34d399); /* Green gradient */
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: scaleInBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
}

/* Success Paragraphs */
.container p {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

.container p:nth-of-type(2) {
    font-weight: 700;
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.6);
    display: inline-block;
    padding: 0.5rem 1.5rem;
    border-radius: 2rem;
    border: 1px solid var(--border-color);
    margin-bottom: 2rem;
}

/* ==========================================================================
   Generated Files List (Card Links)
   ========================================================================== */
.container ul {
    list-style: none;
    padding: 0;
    margin: 0 0 2.5rem 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
}

.container ul li a {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.25rem 1rem;
    background: rgba(255, 255, 255, 0.7);
    border: 2px solid var(--border-color);
    border-radius: 1rem;
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
}

/* Hover effects for the file links */
.container ul li a::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
    transition: left 0.5s ease;
}

.container ul li a:hover {
    background: var(--input-bg);
    border-color: var(--primary);
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(79, 70, 229, 0.15);
    color: var(--primary-hover);
}

.container ul li a:hover::before {
    left: 100%;
}

/* ==========================================================================
   "Submit Another Village" Button
   ========================================================================== */
/* Targeting the direct anchor tag inside the container to style it like a button */
.container > a:not(ul a) {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    text-decoration: none;
    font-size: 1.125rem;
    font-weight: 700;
    padding: 1rem 2.5rem;
    border-radius: 0.75rem;
    box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
    transition: all 0.3s ease;
}

.container > a:not(ul a):hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 25px rgba(79, 70, 229, 0.5);
}

.container > a:not(ul a):active {
    transform: translateY(1px);
    box-shadow: 0 2px 10px rgba(79, 70, 229, 0.3);
}

/* ==========================================================================
   Success Animations
   ========================================================================== */
@keyframes scaleInBounce {
    0% {
        opacity: 0;
        transform: scale(0.5);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}
     </style>
</head>
<body>
    <div class="container">
        <h1>Success!</h1>
        <p>Village data has been successfully submitted and processed.</p>
        <p>Village ID: {{ village_id }}</p>
        <ul>
            <li><a href="/outputs/reports/{{ village_id }}_report.pdf" target="_blank">PDF Report</a></li>
            <li><a href="/outputs/maps/{{ village_id }}_map.png" target="_blank">Map</a></li>
            <li><a href="/outputs/charts/{{ village_id }}_analytics.png" target="_blank">Analytics Chart</a></li>
        </ul>
        <a href="{% url 'input_form' %}">Submit Another Village</a>
    </div>
    <script>
document.querySelectorAll(".container ul li a").forEach(link => {
    link.addEventListener("click", function(e){
        const fileUrl = this.getAttribute("href");

        fetch(fileUrl)
        .then(response => {
            if(!response.ok){
                alert("File not found. Please regenerate the report.");
                e.preventDefault();
            }
        })
        .catch(() => {
            alert("Error accessing file.");
            e.preventDefault();
        });
    });
});
</script>
    </script>
</body>
</html>
